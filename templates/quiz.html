{% extends "base.html" %}
{% block title %}Quiz - {{ module.title }}{% endblock %}
{% block content %}

<h3 class="mb-1">📝 Quiz: {{ module.title }}</h3>
<p class="text-secondary mb-4">Answer all questions, then submit to see your score.</p>

<form method="POST" action="{{ url_for('quiz', module_id=module.id) }}">
    {% for q in questions %}
    <div class="card p-3 mb-3">
        <p class="fw-bold">{{ loop.index }}. {{ q.question }}</p>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="q{{ q.id }}" value="A" required>
            <label class="form-check-label">A. {{ q.option_a }}</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="q{{ q.id }}" value="B">
            <label class="form-check-label">B. {{ q.option_b }}</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="q{{ q.id }}" value="C">
            <label class="form-check-label">C. {{ q.option_c }}</label>
        </div>
        <div class="form-check">
            <input class="form-check-input" type="radio" name="q{{ q.id }}" value="D">
            <label class="form-check-label">D. {{ q.option_d }}</label>
        </div>
    </div>
    {% endfor %}

    <button type="submit" class="btn btn-primary btn-lg w-100">Submit Quiz</button>
</form>

{% endblock %}
